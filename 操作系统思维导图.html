<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 14px/1.5 "Noto Sans CJK SC","Microsoft YaHei",sans-serif;
    background: #0d1117; color: #c9d1d9;
    overflow: hidden; height: 100vh; width: 100vw;
  }

  /* ===== 工具栏 ===== */
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 8px 16px; display: flex; gap: 10px; align-items: center;
  }
  .toolbar button {
    background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: .15s;
  }
  .toolbar button:hover { background: #30363d; }
  .toolbar .sep { flex: 1; }
  .toolbar .hint { color: #8b949e; font-size: 12px; }

  /* ===== 画布 ===== */
  #canvas {
    position: absolute; top: 42px; left: 0; right: 0; bottom: 0;
    cursor: grab; transform-origin: 0 0;
  }
  #canvas:active { cursor: grabbing; }
  #canvas.dragging { cursor: grabbing; }

  /* ===== 节点 ===== */
  .node {
    position: absolute; white-space: nowrap;
    user-select: none; pointer-events: auto;
    transition: transform .2s;
  }
  .node:hover { z-index: 10; }

  /* 中心节点 */
  .node-center {
    padding: 16px 28px; border-radius: 50px;
    font-size: 1.5em; font-weight: 900; letter-spacing: 2px;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    color: #fff; box-shadow: 0 0 40px rgba(245,87,108,.4);
    text-align: center;
  }

  /* 一级分支 */
  .node-l1 {
    padding: 7px 16px; border-radius: 20px;
    font-size: .95em; font-weight: 700;
    cursor: pointer;
  }
  .node-l1.collapsed + .children { display: none; }

  /* 二级子节点 */
  .node-l2 {
    padding: 4px 12px; border-radius: 12px;
    font-size: .8em; font-weight: 500;
  }
  .node-l2.key { font-weight: 700; }

  /* 三级 - 公式/要点 */
  .node-l3 {
    padding: 3px 10px; border-radius: 10px;
    font-size: .72em; opacity: .85;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(255,255,255,.08);
  }
  .node-l3.formula {
    font-family: "JetBrains Mono","Consolas",monospace;
    background: rgba(255,169,64,.1); border-color: rgba(255,169,64,.3);
    color: #ffa940;
  }

  /* 颜色主题 */
  .c1 { background: #1a3a5c; border: 2px solid #2980b9; color: #58a6ff; }   /* 概述 */
  .c2 { background: #1a2e1a; border: 2px solid #2d8a4e; color: #3fb950; }   /* 进程 */
  .c3 { background: #2e1a1a; border: 2px solid #c93c3c; color: #f85149; }   /* 调度 */
  .c4 { background: #2e281a; border: 2px solid #d29922; color: #e2b93b; }   /* PV */
  .c5 { background: #1a1a2e; border: 2px solid #8e44ad; color: #bc8cff; }   /* 死锁 */
  .c6 { background: #1a2e2e; border: 2px solid #0a9; color: #3fb9a0; }      /* 内存 */
  .c7 { background: #2e1a2e; border: 2px solid #e0559a; color: #f778ba; }   /* 置换 */
  .c8 { background: #1a201a; border: 2px solid #6a9; color: #7ee787; }      /* 磁盘 */
  .c9 { background: #201a10; border: 2px solid #b89; color: #d4a574; }      /* 文件 */
  .c10{ background: #102020; border: 2px solid #5af; color: #79c0ff; }      /* I/O */

  /* ===== SVG 连线层 ===== */
  #lines {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; pointer-events: none; z-index: 0;
  }

  /* ===== 响应式 ===== */
  @media (max-width: 768px) {
    .node-center { font-size: 1.1em; padding: 12px 20px; }
    .node-l1 { font-size: .8em; padding: 5px 12px; }
    .node-l2 { font-size: .7em; }

// ==================== 布局引擎 ====================
const canvas = document.getElementById('canvas');
const svg = document.getElementById('lines');
let nodes = [];
let scale = 1, offsetX = 0, offsetY = 0;
let collapsed = new Set();

// 布局参数
const L1_RADIUS = 220;      // 一级节点到中心距离
const L2_GAP_X = 180;       // 二级水平间距
const L2_GAP_Y = 28;        // 二级垂直间距

function buildLayout(root) {
  let allNodes = [];

  // 中心
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2 + 200;

  allNodes.push({ ...root, x: cx, y: cy, level: 0 });

  const n = root.children.length;
  const angleStep = (2 * Math.PI) / n;
  // 起始角度偏移使第一个节点在顶部偏右
  const startAngle = -Math.PI / 2;

  root.children.forEach((ch, i) => {
    const angle = startAngle + i * angleStep;
    const l1x = cx + L1_RADIUS * Math.cos(angle);
    const l1y = cy + L1_RADIUS * Math.sin(angle);

    allNodes.push({ ...ch, x: l1x, y: l1y, level: 1, parentId: root.id });

    if (ch.children && !collapsed.has(ch.id)) {
      const kids = ch.children;
      const totalHeight = (kids.length - 1) * L2_GAP_Y;
      const startY = l1y - totalHeight / 2;

      // 决定子节点方向：根据一级节点在中心的上方还是下方
      const goRight = l1x < cx;

      kids.forEach((k, j) => {
        const l2x = goRight ? l1x + L2_GAP_X : l1x - L2_GAP_X;
        const l2y = startY + j * L2_GAP_Y;
        const id = k.id || (ch.id + '-' + j);
        allNodes.push({ ...k, id, x: l2x, y: l2y, level: 2, parentId: ch.id });

        if (k.children && !collapsed.has(id)) {
          const grandkids = k.children;
          const gkTotalH = (grandkids.length - 1) * L2_GAP_Y;
          const gkStartY = l2y - gkTotalH / 2;
          const gkGoRight = l2x < l1x ? l2x < cx : l2x > cx;

          grandkids.forEach((gk, gi) => {
            const l3x = gkGoRight ? l2x + 160 : l2x - 160;
            const l3y = gkStartY + gi * L2_GAP_Y;
            const gid = gk.id || (id + '-' + gi);
            allNodes.push({ ...gk, id: gid, x: l3x, y: l3y, level: 3, parentId: id });
          });
        }
      });
    }
  });

  return allNodes;
}

function render() {
  const allNodes = buildLayout(data);
  nodes = allNodes;

  // 清空画布
  canvas.querySelectorAll('.node').forEach(el => el.remove());

  // 画连线
  let linesSvg = '';

  // 中心到一级
  data.children.forEach(ch => {
    const p = findNode(allNodes, data.id);
    const c = findNode(allNodes, ch.id);
    if (p && c) linesSvg += drawCurve(p.x, p.y, c.x, c.y, '#555');
  });

  // 一级到二级
  data.children.forEach(ch => {
    if (collapsed.has(ch.id)) return;
    const p = findNode(allNodes, ch.id);
    if (!p) return;
    (ch.children || []).forEach(k => {
      const cid = k.id || (ch.id + '-' + (ch.children.indexOf(k)));
      const c = findNode(allNodes, cid);
      if (c) linesSvg += drawCurve(p.x, p.y, c.x, c.y, '#444');
    });
  });

  // 二级到三级
  data.children.forEach(ch => {
    if (collapsed.has(ch.id)) return;
    (ch.children || []).forEach(k => {
      const cid = k.id || (ch.id + '-' + ch.children.indexOf(k));
      if (collapsed.has(cid)) return;
      const p = findNode(allNodes, cid);
      if (!p) return;
      (k.children || []).forEach((gk, gi) => {
        const gid = gk.id || (cid + '-' + gi);
        const c = findNode(allNodes, gid);
        if (c) linesSvg += drawCurve(p.x, p.y, c.x, c.y, '#333');
      });
    });
  });

  svg.innerHTML = linesSvg;

  // 画节点
  allNodes.forEach(n => {
    const el = document.createElement('div');
    el.className = 'node';
    el.id = 'n-' + n.id;
    el.style.left = n.x + 'px';
    el.style.top = n.y + 'px';
    el.style.transform = 'translate(-50%, -50%)';

    let cls = '';
    if (n.level === 0) cls = 'node-center';
    else if (n.level === 1) cls = 'node-l1 ' + (n.cls || '');
    else if (n.level === 2) cls = 'node-l2 ' + (n.cls || '') + (n.key ? ' key' : '');
    else cls = 'node-l3 ' + (n.cls || '') + (n.formula ? ' formula' : '');

    el.className += ' ' + cls;

    // 一级节点显示折叠指示
    if (n.level === 1 && n.children) {
      el.textContent = (collapsed.has(n.id) ? '▶ ' : '▼ ') + n.label;
    } else {
      el.textContent = n.label;
    }

    // 点击折叠
    if (n.level === 1 && n.children) {
      el.style.cursor = 'pointer';
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        toggle(n.id);
      });
    }

    canvas.appendChild(el);
  });
}

function findNode(allNodes, id) {
  return allNodes.find(n => n.id === id);
}

function drawCurve(x1, y1, x2, y2, color) {
  const midX = (x1 + x2) / 2;
  return `<path d="M${x1},${y1} C${midX},${y1} ${midX},${y2} ${x2},${y2}"
    stroke="${color}" stroke-width="1.5" fill="none" opacity="0.5"/>`;
}

function toggle(id) {
  if (collapsed.has(id)) collapsed.delete(id);
  else collapsed.add(id);
  render();
}

function expandAll() { collapsed.clear(); render(); }
function collapseAll() {
  data.children.forEach(ch => collapsed.add(ch.id));
  render();
}

// ==================== 平移 + 缩放 ====================
let isDragging = false, startX, startY;

canvas.addEventListener('mousedown', (e) => {
  if (e.target.closest('.node')) return;
  isDragging = true; startX = e.clientX - offsetX; startY = e.clientY - offsetY;
  canvas.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  offsetX = e.clientX - startX;
  offsetY = e.clientY - startY;
  canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
});

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  scale = Math.max(0.3, Math.min(3, scale * delta));
  canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}, { passive: false });

function fitScreen() {
  scale = 1; offsetX = 0; offsetY = 0;
  canvas.style.transform = 'translate(0px, 0px) scale(1)';
  render();
}

// ==================== 触摸支持 ====================
let lastTouchDist = 0;
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    isDragging = true; startX = e.touches[0].clientX - offsetX;
    startY = e.touches[0].clientY - offsetY;
  } else if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    offsetX = e.touches[0].clientX - startX;
    offsetY = e.touches[0].clientY - startY;
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    scale = Math.max(0.3, Math.min(3, scale * (dist / lastTouchDist)));
    lastTouchDist = dist;
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }
}, { passive: false });

// ==================== 初始渲染 ====================
render();
fitScreen();

// 窗口大小变化时重建布局
window.addEventListener('resize', () => render());
</script>
</body>
</html>
